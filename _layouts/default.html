<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" type="image/png" href="{{ '/public/icons/SortItOut_logo_48.png' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --violet-600: #7c3aed;
            --violet-500: #8b5cf6;
            --violet-50: #f5f3ff;
            --gray-900: #111827;
            --gray-700: #374151;
            --gray-500: #6b7280;
            --gray-300: #d1d5db;
            --gray-100: #f3f4f6;
            --gray-50: #f9fafb;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--gray-700);
            background: linear-gradient(180deg, var(--violet-50) 0%, #ffffff 240px);
            line-height: 1.6;
        }

        .header {
            max-width: 760px;
            margin: 0 auto;
            padding: 56px 24px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .header .brand {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.01em;
        }

        .header .brand span {
            color: var(--violet-600);
        }

        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border: 1px solid var(--gray-100);
            border-radius: 16px;
            padding: 40px 48px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(124,58,237,0.06);
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
            margin: 0 0 16px;
            line-height: 1.2;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--gray-900);
            letter-spacing: -0.01em;
            margin: 36px 0 12px;
        }

        h3 {
            font-size: 17px;
            font-weight: 600;
            color: var(--gray-900);
            margin: 24px 0 8px;
        }

        p { margin: 0 0 14px; }

        a {
            color: var(--violet-600);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
        }

        a:hover { border-bottom-color: var(--violet-600); }

        ul {
            padding-left: 22px;
            margin: 0 0 14px;
        }

        li { margin-bottom: 6px; }

        strong { color: var(--gray-900); font-weight: 600; }

        code {
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            background: var(--gray-100);
            color: var(--violet-600);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.88em;
        }

        hr {
            border: none;
            border-top: 1px solid var(--gray-100);
            margin: 28px 0;
        }

        footer {
            max-width: 760px;
            margin: 32px auto 56px;
            padding: 0 24px;
            text-align: center;
            color: var(--gray-500);
            font-size: 14px;
        }

        footer a { color: var(--gray-500); }
        footer a:hover { color: var(--violet-600); border-bottom-color: var(--violet-600); }

        @media (max-width: 600px) {
            .card { padding: 28px 24px; }
            h1 { font-size: 28px; }
            h2 { font-size: 19px; }
            .header { padding: 32px 24px 16px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="{{ '/public/icons/SortItOut_logo_48.png' | relative_url }}" alt="SortItOut logo">
        <div class="brand">Sort<span>ItOut</span></div>
    </header>

    <main>
        <article class="card">
            {{ content }}
        </article>
    </main>

    <footer>
        <a href="{{ '/' | relative_url }}">Home</a> &middot;
        <a href="{{ '/PRIVACY' | relative_url }}">Privacy</a> &middot;
        <a href="https://github.com/NinyaDev/SortItOut-Extension">GitHub</a>
    </footer>
</body>
</html>
